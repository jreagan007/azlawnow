name: Content Audit

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/content-audit.yml'
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Content audit (strict)
        run: npm run check:quality:strict

      - name: Internal link audit (strict)
        run: npm run check:sources:strict

      - name: Image weight audit
        run: npm run check:images
