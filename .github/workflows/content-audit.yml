name: Content Audit

on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'scripts/audit-quality.ts'
      - 'scripts/lib/**'
      - 'package.json'
      - '.github/workflows/content-audit.yml'
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content audit (strict)
        run: npm run check:quality:strict
