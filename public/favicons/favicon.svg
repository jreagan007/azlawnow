<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Favicon: Saguaro silhouette on Newsprint -->
  <rect width="32" height="32" rx="4" fill="#FAF5ED"/>
  <g fill="#1A1A1A">
    <!-- Main trunk -->
    <rect x="14" y="6" width="4" height="20" rx="1.5"/>
    <!-- Left arm -->
    <rect x="7" y="14" width="4" height="9" rx="1.5"/>
    <rect x="7" y="11" width="4" height="6" rx="1.5"/>
    <rect x="7" y="11" width="8" height="3" rx="1.5"/>
    <!-- Right arm -->
    <rect x="21" y="12" width="4" height="9" rx="1.5"/>
    <rect x="21" y="9" width="4" height="6" rx="1.5"/>
    <rect x="17" y="9" width="8" height="3" rx="1.5"/>
    <!-- Ground line -->
    <rect x="4" y="26" width="24" height="1.5" rx="0.75"/>
  </g>
</svg>