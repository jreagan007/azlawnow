[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# www redirect
[[redirects]]
  from = "https://www.azlawnow.com/*"
  to = "https://azlawnow.com/:splat"
  status = 301
  force = true

# Editorial route consolidation: /blog/, /resources/, /investigations/ → /insights/
[[redirects]]
  from = "/blog/*"
  to = "/insights/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/resources/*"
  to = "/insights/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/investigations/*"
  to = "/insights/:splat"
  status = 301
  force = true

# Practice area URL flattening: nested cluster → root-level
[[redirects]]
  from = "/vehicle-crashes/car-accidents/*"
  to = "/car-accidents/:splat"
  status = 301

[[redirects]]
  from = "/vehicle-crashes/truck-accidents/*"
  to = "/truck-accidents/:splat"
  status = 301

[[redirects]]
  from = "/vehicle-crashes/motorcycle-accidents/*"
  to = "/motorcycle-accidents/:splat"
  status = 301

[[redirects]]
  from = "/vehicle-crashes/pedestrian-accidents/*"
  to = "/pedestrian-accidents/:splat"
  status = 301

[[redirects]]
  from = "/vehicle-crashes/bicycle-accidents/*"
  to = "/bicycle-accidents/:splat"
  status = 301

[[redirects]]
  from = "/vehicle-crashes/bus-accidents/*"
  to = "/bus-accidents/:splat"
  status = 301

[[redirects]]
  from = "/vehicle-crashes/rideshare-accidents/*"
  to = "/rideshare-accidents/:splat"
