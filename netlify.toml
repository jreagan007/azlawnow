[build]
  command = "npm run check:quality:strict && npm run check:sources:strict && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# www redirect
[[redirects]]
  from = "https://www.azlawnow.com/*"
  to = "https://azlawnow.com/:splat"
  status = 301
  force = true

# About page consolidation (April 2026): the standalone team page was merged
# into the editorial /about/ page. Old /about/team/ URLs 301 to /about/.
# Individual author bios now live as anchor sections on /about/ (see authors.ts).
[[redirects]]
  from = "/about/team/brendan-franks/*"
  to = "/about/#brendan-franks"
  status = 301
  force = true

[[redirects]]
  from = "/about/team/brandon-millam/*"
  to = "/about/#brandon-millam"
  status = 301
  force = true

[[redirects]]
  from = "/about/team/stephanie-ramirez/*"
  to = "/about/#stephanie-ramirez"
  status = 301
  force = true

[[redirects]]
  from = "/about/team/*"
  to = "/about/#the-editors"
  status = 301
  force = true

# Editorial route consolidation: /blog/, /resources/, /insights/ → /investigations/
