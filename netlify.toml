[build]
  # NOTE: check:schema is intentionally NOT in this chain. It runs the shared
  # hub guardrail at ../taqticscom/scripts/check-schema.ts, which only exists
  # in the local/monorepo checkout — Netlify checks out this repo alone, so
  # invoking it here hard-fails every deploy. check:schema is a local/pre-push
  # gate (see .claude/commands/mode-audit.md); do not re-add it to this command.
  command = "npm run check:quality:strict && npm run check:sources:strict && npm run check:og && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Security headers

# All [[redirects]] rules live in public/_redirects (Netlify's native
# plain-text redirect format). Edit there for new 301/302/410 rules.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache immutable assets
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Forms
[functions]
  directory = "netlify/functions"

