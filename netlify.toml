[[redirects]]
  from = "/abuse-negligence/elder-abuse/*"
  to = "/elder-abuse/:splat"
  status = 301

[[redirects]]
  from = "/abuse-negligence/nursing-home-abuse/*"
  to = "/nursing-home-abuse/:splat"
  status = 301

[[redirects]]
  from = "/abuse-negligence/child-abuse/*"
